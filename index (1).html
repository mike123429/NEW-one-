<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>808 DRUM PAD</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
<style>
  body {
    background: #0a0a0a;
    color: #f0f0f0;
    font-family: monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
  }

  h1 {
    font-size: 72px;
    letter-spacing: 0.1em;
    margin-bottom: 24px;
  }

  #grid {
    display: grid;
    grid-template-columns: repeat(4, 140px);
    gap: 12px;
  }

  .pad {
    height: 140px;
    background: #111;
    border: 2px solid #333;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: bold;
    font-family: monospace;
    color: inherit;
    transition: transform 0.07s;
  }

  .pad:active {
    transform: scale(0.92);
  }

  label {
    margin-top: 20px;
    font-size: 12px;
    color: #555;
    letter-spacing: 0.2em;
  }

  input[type=range] {
    width: 160px;
    margin-top: 8px;
  }
</style>
</head>
<body>

<h1>808</h1>

<div id="grid"></div>

<label>VOL</label>
<input type="range" id="vol" min="0" max="1" step="0.01" value="0.8">

<script>
// pad definitions — name, keyboard key, color
const pads = [
  { name: 'KICK',  key: 'Q', color: '#ff3c3c' },
  { name: 'SNARE', key: 'W', color: '#ff9500' },
  { name: 'CLAP',  key: 'E', color: '#ffe600' },
  { name: 'TOM H', key: 'R', color: '#00e5ff' },
  { name: 'TOM L', key: 'A', color: '#a855f7' },
  { name: 'HH CL', key: 'S', color: '#00ff88' },
  { name: 'HH OP', key: 'D', color: '#ff6ec7' },
  { name: 'RIDE',  key: 'F', color: '#ffa0a0' },
];

// master volume
const vol = new Tone.Volume(-3).toDestination();

// build synths for each pad
let synths = [];
let started = false;

async function start() {
  if (started) return;
  await Tone.start();
  started = true;

  synths = [
    new Tone.MembraneSynth({ pitchDecay: 0.08, octaves: 8, envelope: { attack: 0.001, decay: 0.35, sustain: 0, release: 0.1 }}).connect(vol),   // kick
    new Tone.NoiseSynth({ noise: { type: 'white' }, envelope: { attack: 0.001, decay: 0.18, sustain: 0, release: 0.05 }}).connect(vol),            // snare
    new Tone.NoiseSynth({ noise: { type: 'pink' },  envelope: { attack: 0.005, decay: 0.12, sustain: 0, release: 0.05 }}).connect(vol),            // clap
    new Tone.MembraneSynth({ pitchDecay: 0.05, octaves: 4, envelope: { attack: 0.001, decay: 0.22, sustain: 0, release: 0.05 }}).connect(vol),     // tom hi
    new Tone.MembraneSynth({ pitchDecay: 0.07, octaves: 5, envelope: { attack: 0.001, decay: 0.3,  sustain: 0, release: 0.08 }}).connect(vol),     // tom low
    new Tone.MetalSynth({ frequency: 400, harmonicity: 5.1, modulationIndex: 32, resonance: 4000, octaves: 1.5, envelope: { attack: 0.001, decay: 0.05,  release: 0.01 }}).connect(vol), // hh closed
    new Tone.MetalSynth({ frequency: 400, harmonicity: 5.1, modulationIndex: 32, resonance: 4000, octaves: 1.5, envelope: { attack: 0.001, decay: 0.45,  release: 0.1  }}).connect(vol), // hh open
    new Tone.MetalSynth({ frequency: 250, harmonicity: 8.1, modulationIndex: 16, resonance: 5000, octaves: 1.2, envelope: { attack: 0.001, decay: 0.8,   release: 0.2  }}).connect(vol), // ride
  ];
}

// trigger each synth
const notes = ['C1', null, null, 'G2', 'D2', null, null, null];
function trigger(i) {
  const s = synths[i];
  if (!s) return;
  notes[i] ? s.triggerAttackRelease(notes[i], '8n') : s.triggerAttackRelease('8n');
}

// build pad elements
const grid = document.getElementById('grid');
const els = [];

pads.forEach((p, i) => {
  const div = document.createElement('div');
  div.className = 'pad';
  div.textContent = p.name;
  div.style.color = p.color;
  div.style.borderColor = '#333';
  div.addEventListener('pointerdown', async e => {
    e.preventDefault();
    await start();
    trigger(i);
    div.style.borderColor = p.color;
    div.style.background = p.color + '33';
    setTimeout(() => { div.style.borderColor = '#333'; div.style.background = '#111'; }, 200);
  });
  grid.appendChild(div);
  els.push(div);
});

// keyboard
const keys = {};
pads.forEach((p, i) => keys[p.key] = i);
document.addEventListener('keydown', async e => {
  if (e.repeat) return;
  const i = keys[e.key.toUpperCase()];
  if (i !== undefined) { await start(); trigger(i); els[i].dispatchEvent(new Event('pointerdown')); }
});

// volume
document.getElementById('vol').addEventListener('input', e => {
  vol.volume.value = Tone.gainToDb(+e.target.value);
});
</script>
</body>
</html>
